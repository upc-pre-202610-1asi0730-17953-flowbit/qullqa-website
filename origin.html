<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Qullqa - Crear Cuenta</title>
    <link rel="stylesheet" href="css/origin.css">
</head>
<body>
    <div class="reg-container">
        <div class="reg-card">
            <a href="formulario.html" class="back-link">← Volver</a>
            <h2>Crear cuenta en Qullqa</h2>
            <p class="subtitle">Registra tu negocio y comienza a gestionar tu inventario</p>

            <form>
                <div class="section-title">Datos del Negocio</div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Nombre del negocio *</label>
                        <input type="text" placeholder="Ej: Bodega San Martín">
                    </div>
                    <div class="input-group">
                        <label>RUC (opcional)</label>
                        <input type="text" placeholder="20123456789">
                    </div>
                </div>

                <div class="section-title">Datos Personales</div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Nombre completo *</label>
                        <input type="text" placeholder="Juan Pérez">
                    </div>
                    <div class="input-group">
                        <label>Teléfono (opcional)</label>
                        <input type="text" placeholder="987654321">
                    </div>
                </div>

                <div class="section-title">Credenciales de Acceso</div>
                <div class="input-group full">
                    <label>Correo electrónico *</label>
                    <input type="email" placeholder="tu@correo.com">
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Contraseña *</label>
                        <input type="password" placeholder="********">
                    </div>
                    <div class="input-group">
                        <label>Confirmar contraseña *</label>
                        <input type="password" placeholder="********">
                    </div>
                </div>

                <button type="submit" class="btn-reg">Crear Cuenta</button>
                <p class="terms">Al registrarte, aceptas nuestros términos y condiciones</p>
            </form>
        </div>
    </div>
</body>
</html>
